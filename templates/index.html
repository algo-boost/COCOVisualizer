<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COCO数据集可视化工具</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600&display=swap" rel="stylesheet">
    <script src="/static/vendor/react.production.min.js"></script>
    <script src="/static/vendor/react-dom.production.min.js"></script>
    <script src="/static/vendor/babel.min.js"></script>
    <script src="/static/vendor/plotly.min.js"></script>
    <script src="/static/vendor/jszip.min.js"></script>
    <link rel="stylesheet" href="/static/react-app.css">
</head>
<body>
    <div id="root"></div>
    <div id="load-fail" class="load-fail-banner" style="display:none;">
        <p><strong>脚本加载失败</strong></p>
        <p>若为离线环境，请先运行 <code>python3 packaging/fetch_vendor_js.py</code> 下载前端依赖到 static/vendor/。</p>
        <p>或检查浏览器控制台报错。</p>
    </div>
    <script>
      (function(){
        var t = setTimeout(function(){
          if (!window.React || !window.ReactDOM) {
            document.getElementById('root').style.display = 'none';
            document.getElementById('load-fail').style.display = 'block';
          }
        }, 8000);
        window.addEventListener('load', function(){ clearTimeout(t); });
      })();
    </script>
    <script type="text/babel" src="/static/react-app.jsx"></script>
</body>
</html>
