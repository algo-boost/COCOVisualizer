# COCO Visualizer - 安装包构建与发布（正式发布）
#
# 触发方式（二选一）：
#   1) 打版本标签并推送：git tag v1.7.2 && git push origin v1.7.2
#      → 自动构建 Windows + macOS，并创建 GitHub Release，上传 .exe / .zip / .dmg
#   2) 手动：Actions → Release → Run workflow（可填版本号，生成预发布/手动构建）
#
# 说明：仅把提交 push 到 main 不会触发本工作流。若希望每次 push 都生成安装包（不上传 Release），
#       使用工作流「Push build (artifacts)」（.github/workflows/push-build-artifacts.yml）。
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.0），留空则使用 version.txt'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装构建依赖
        run: |
          pip install -r requirements.txt
          pip install -r requirements-build.txt
          pip install pyinstaller

      - name: 更新版本号（手动触发时）
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          echo "${{ github.event.inputs.version }}" > version.txt

      - name: 安装 Inno Setup
        run: |
          choco install innosetup -y

      - name: 构建安装包
        run: |
          .\packaging\build.ps1 -CreateInstaller

      - name: 读取版本号
        id: version
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: 确定发布标签
        id: tag
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            $tag = "v${{ steps.version.outputs.VERSION }}-manual.${{ github.run_id }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT

      - name: 从 CHANGELOG 生成本版 Release 说明
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: python -X utf8 packaging/extract_changelog_for_release.py

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: COCO Visualizer ${{ steps.version.outputs.VERSION }}${{ github.event_name == 'workflow_dispatch' && ' (Manual Build)' || '' }}
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          body_path: release_body.md
          files: |
            dist/*.zip
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: build-windows
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 更新版本号（手动触发时）
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          echo "${{ github.event.inputs.version }}" > version.txt

      - name: 构建 .app 与 DMG
        run: |
          chmod +x scripts/build_mac_app.sh scripts/create_mac_dmg.sh
          ./scripts/build_mac_app.sh
          ./scripts/create_mac_dmg.sh

      - name: 读取版本号
        id: version
        run: |
          VER=$(sed -n '1p' version.txt | tr -d '\r\t ')
          echo "VERSION=$VER" >> "$GITHUB_OUTPUT"

      - name: 确定发布标签
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=v${{ steps.version.outputs.VERSION }}-manual.${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 上传 macOS DMG 到同一 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          files: dist/COCO-Visualizer-mac-${{ steps.version.outputs.VERSION }}.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
