# COCO Visualizer - 安装包构建与发布
# 触发方式：
#   1. 推送版本标签（如 v1.0.0）: git tag v1.0.0 && git push origin v1.0.0
#   2. 手动运行：Actions -> Release -> Run workflow

name: Release

on:
  push:
    tags:
      # 仅匹配语义化版本标签，避免 build 等标签触发
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.0），留空则使用 version.txt'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write  # 创建 Release 和上传资源需要

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装构建依赖
        run: |
          pip install -r requirements.txt
          pip install -r requirements-build.txt
          pip install pyinstaller

      - name: 更新版本号（手动触发时）
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          echo "${{ github.event.inputs.version }}" > version.txt

      - name: 安装 Inno Setup
        run: |
          choco install innosetup -y

      - name: 构建安装包
        run: |
          .\packaging\build.ps1 -CreateInstaller

      - name: 读取版本号
        id: version
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: 确定发布标签
        id: tag
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
            # 手动触发使用 -manual 后缀，避免触发 tag 推送的重复构建
            $tag = "v${{ steps.version.outputs.VERSION }}-manual.${{ github.run_id }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: COCO Visualizer ${{ steps.version.outputs.VERSION }}${{ github.event_name == 'workflow_dispatch' && ' (Manual Build)' || '' }}
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
